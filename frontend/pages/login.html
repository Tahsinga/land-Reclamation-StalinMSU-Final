<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Mimosa Mining</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">

  <div class="bg-slate-800 rounded-2xl shadow-2xl p-10 w-full max-w-md border border-slate-700">

    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white">Welcome Back</h1>
      <p class="text-slate-400 mt-1 text-sm">Mimosa Mining Geospatial Database</p>
      <div class="w-16 h-1 bg-yellow-500 mx-auto mt-3 rounded"></div>
    </div>

    <!-- Role Display -->
    <div class="bg-slate-700 rounded-lg px-4 py-2 mb-6 text-center">
      <p class="text-yellow-400 text-sm font-medium">
        Logging in as: <span id="roleDisplay" class="uppercase font-bold"></span>
      </p>
    </div>

    <!-- Form -->
    <div class="flex flex-col gap-4">

      <div>
        <label class="text-slate-300 text-sm mb-1 block">Email Address</label>
        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          class="w-full bg-slate-700 text-white border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-yellow-500 placeholder-slate-500"
        />
      </div>

      <div>
        <label class="text-slate-300 text-sm mb-1 block">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          class="w-full bg-slate-700 text-white border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-yellow-500 placeholder-slate-500"
        />
      </div>

      <!-- Error Message -->
      <p id="errorMsg" class="text-red-400 text-sm hidden"></p>

      <!-- Login Button -->
      <button
        onclick="handleLogin()"
        class="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-bold py-3 rounded-lg transition-all duration-300 mt-2">
        Login
      </button>

      <!-- Register Link -->
      <p class="text-slate-400 text-sm text-center mt-2">
        Don't have an account?
        <a href="/pages/register.html" class="text-yellow-400 hover:underline font-medium">Register here</a>
      </p>

      <!-- Back Link -->
      <p class="text-slate-500 text-sm text-center">
        <a href="/pages/landing.html" class="hover:text-slate-300">← Back to department selection</a>
      </p>

    </div>
  </div>

  <script>
    // Show selected role
    const role = localStorage.getItem('selectedRole') || 'user'
    document.getElementById('roleDisplay').textContent = role

    async function handleLogin() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const errorMsg = document.getElementById('errorMsg')

      if (!email || !password) {
        errorMsg.textContent = 'Please fill in all fields'
        errorMsg.classList.remove('hidden')
        return
      }

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, role })
        })

        const data = await response.json()

        if (response.ok) {
          localStorage.setItem('token', data.token)
          localStorage.setItem('user', JSON.stringify(data.user))
          window.location.href = '/pages/dashboard.html'
        } else {
          errorMsg.textContent = data.message || 'Login failed'
          errorMsg.classList.remove('hidden')
        }

      } catch (err) {
        errorMsg.textContent = 'Server error. Please try again.'
        errorMsg.classList.remove('hidden')
      }
    }
  </script>

</body>
</html>
