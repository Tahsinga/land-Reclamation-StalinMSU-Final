<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Mimosa Mining</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">

  <div class="bg-slate-800 rounded-2xl shadow-2xl p-10 w-full max-w-md border border-slate-700">

    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white">Create Account</h1>
      <p class="text-slate-400 mt-1 text-sm">Mimosa Mining Geospatial Database</p>
      <div class="w-16 h-1 bg-yellow-500 mx-auto mt-3 rounded"></div>
    </div>

    <!-- Role Display -->
    <div class="bg-slate-700 rounded-lg px-4 py-2 mb-6 text-center">
      <p class="text-yellow-400 text-sm font-medium">
        Registering as: <span id="roleDisplay" class="uppercase font-bold"></span>
      </p>
    </div>

    <!-- Form -->
    <div class="flex flex-col gap-4">

      <div>
        <label class="text-slate-300 text-sm mb-1 block">Full Name</label>
        <input
          type="text"
          id="fullname"
          placeholder="Enter your full name"
          class="w-full bg-slate-700 text-white border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-yellow-500 placeholder-slate-500"
        />
      </div>

      <div>
        <label class="text-slate-300 text-sm mb-1 block">Email Address</label>
        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          class="w-full bg-slate-700 text-white border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-yellow-500 placeholder-slate-500"
        />
      </div>

      <div>
        <label class="text-slate-300 text-sm mb-1 block">Employee ID</label>
        <input
          type="text"
          id="employeeId"
          placeholder="Enter your employee ID"
          class="w-full bg-slate-700 text-white border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-yellow-500 placeholder-slate-500"
        />
      </div>

      <div>
        <label class="text-slate-300 text-sm mb-1 block">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Create a password"
          class="w-full bg-slate-700 text-white border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-yellow-500 placeholder-slate-500"
        />
      </div>

      <div>
        <label class="text-slate-300 text-sm mb-1 block">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          placeholder="Confirm your password"
          class="w-full bg-slate-700 text-white border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-yellow-500 placeholder-slate-500"
        />
      </div>

      <!-- Error and Success Messages -->
      <p id="errorMsg" class="text-red-400 text-sm hidden"></p>
      <p id="successMsg" class="text-green-400 text-sm hidden"></p>

      <!-- Register Button -->
      <button
        onclick="handleRegister()"
        class="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-bold py-3 rounded-lg transition-all duration-300 mt-2">
        Create Account
      </button>

      <!-- Login Link -->
      <p class="text-slate-400 text-sm text-center mt-2">
        Already have an account?
        <a href="/pages/login.html" class="text-yellow-400 hover:underline font-medium">Login here</a>
      </p>

      <!-- Back Link -->
      <p class="text-slate-500 text-sm text-center">
        <a href="/pages/landing.html" class="hover:text-slate-300">← Back to department selection</a>
      </p>

    </div>
  </div>

  <script>
    const role = localStorage.getItem('selectedRole') || 'user'
    document.getElementById('roleDisplay').textContent = role

    async function handleRegister() {
      const fullname = document.getElementById('fullname').value
      const email = document.getElementById('email').value
      const employeeId = document.getElementById('employeeId').value
      const password = document.getElementById('password').value
      const confirmPassword = document.getElementById('confirmPassword').value
      const errorMsg = document.getElementById('errorMsg')
      const successMsg = document.getElementById('successMsg')

      errorMsg.classList.add('hidden')
      successMsg.classList.add('hidden')

      if (!fullname || !email || !employeeId || !password || !confirmPassword) {
        errorMsg.textContent = 'Please fill in all fields'
        errorMsg.classList.remove('hidden')
        return
      }

      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match'
        errorMsg.classList.remove('hidden')
        return
      }

      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters'
        errorMsg.classList.remove('hidden')
        return
      }

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullname, email, employeeId, password, role })
        })

        const data = await response.json()

        if (response.ok) {
          successMsg.textContent = 'Account created successfully! Redirecting to login...'
          successMsg.classList.remove('hidden')
          setTimeout(() => {
            window.location.href = '/pages/login.html'
          }, 2000)
        } else {
          errorMsg.textContent = data.message || 'Registration failed'
          errorMsg.classList.remove('hidden')
        }

      } catch (err) {
        errorMsg.textContent = 'Server error. Please try again.'
        errorMsg.classList.remove('hidden')
      }
    }
  </script>

</body>
</html>
